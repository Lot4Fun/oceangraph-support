name: ドキュメント改善 / Documentation improvement
description: わかりにくい、足りない、古い説明を報告する / Report unclear, missing, or outdated documentation.
labels:
  - documentation
body:
  - type: textarea
    id: feedback
    attributes:
      label: 改善が必要な点 / Documentation issue
      description: わかりにくい、足りない、古い、間違っている内容を記入してください。 / What is unclear, missing, outdated, or incorrect?
      placeholder: |
        例 / Example:
        Visual Lab の保存方法がどこに書かれているかわかりませんでした。
        I could not find where saving in Visual Lab is documented.
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: 関連するページ / Page
      description: ページがわかる場合は URL や名前を記入してください。 / Add the URL or page name if you know it.
      placeholder: "例 / Example: https://docs.oceangraph.io/..."
    validations:
      required: false
  - type: textarea
    id: suggestion
    attributes:
      label: 希望する修正 / Suggested change
      description: 追加を希望する説明や修正案があれば記入してください。 / Add a suggested change if you have one.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: 公開 Issue の確認 / Public issue checklist
      options:
        - label: パスワード、API キー、トークン、個人情報、非公開情報を含めていません。 / I have not included passwords, tokens, personal data, or private information.
          required: true
