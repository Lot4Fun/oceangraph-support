name: 不具合報告 / Bug report
description: うまく動かないことを報告する / Report something that is not working as expected.
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 不具合の内容 / Summary
      description: 何が起きましたか？ / What is the problem?
      placeholder: |
        例 / Example:
        Visual Lab でグラフを保存しようとするとエラーになります。
        An error occurs when I try to save a graph in Visual Lab.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順 / Steps to reproduce
      description: 同じ状況を再現できる手順を、わかる範囲で記入してください。 / List the steps to reproduce the issue, if known.
      placeholder: |
        例 / Example:
        1. Visual Lab を開く / Open Visual Lab
        2. グラフを作成する / Create a graph
        3. 保存を押す / Click Save
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: 期待した動き / Expected behavior
      description: 期待していた動作を記入してください。 / Enter the behavior you expected.
    validations:
      required: false
  - type: input
    id: page
    attributes:
      label: 関連する画面・機能 / Page or feature
      description: どの画面や機能で起きましたか？ / Which OceanGraph page or feature were you using?
      placeholder: "例 / Example: Visual Lab, Analysis Lab, https://docs.oceangraph.io/..."
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: ブラウザ / Browser
      placeholder: "例 / Example: Chrome 125, Safari 17, Firefox 126"
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS / Operating system
      placeholder: "例 / Example: macOS, Windows, Ubuntu, iOS, Android"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: 画像・録画 / Screenshots or recordings
      description: スクリーンショットや録画があれば添付してください。 / Attach screenshots or recordings if they help.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: 公開 Issue の確認 / Public issue checklist
      options:
        - label: パスワード、API キー、トークン、個人情報、非公開情報を含めていません。 / I have not included passwords, tokens, personal data, or private information.
          required: true
