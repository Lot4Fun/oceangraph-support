name: Question
description: Ask a usage question about OceanGraph.
title: "[Question]: "
labels:
  - question
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Please check https://docs.oceangraph.io/ before opening a question.
        Do not include private account details or sensitive data.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to understand?
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Related page or feature
      placeholder: "Example: Analysis Lab, data filtering, https://docs.oceangraph.io/..."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you trying to do?
    validations:
      required: false

